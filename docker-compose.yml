services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockquantbot_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./models:/app/models
      - ./cache:/app/cache
      - ./output:/app/output
