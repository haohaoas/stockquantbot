universe:
  min_price: 4.0
  max_price: 50.0
  min_avg_amount_20: 100000000
  exclude_st: true
universe_file: ./data/universe.csv
use_universe_file: true
allow_eastmoney_fallback: false
trade_calendar_file: ./data/trade_calendar.csv
use_trade_calendar_file: true
api_cache_sec: 30
market_scope:
- sh
- sz
exclude_star: true
exclude_chi_next: false
mainboard_only: true
watchlist_file: ./data/watchlist.csv
exclude_limit_up: true
limit_up_pct: 9.8
exclude_non_realtime_pct: true
index:
  symbol: "000300"
  ma_window: 200
  regime_filter: true
features:
  set: compact
signals:
  preselect_n: 300
  dynamic_preselect_expand: true
  dynamic_preselect_buy_min: 1
  dynamic_preselect_steps: [300, 600, 1000]
  preselect_layered: true
  preselect_layer_col: mkt_cap
  preselect_layer_bins: [0, 30000000000, 100000000000, 300000000000]
  preselect_layer_weights: [0.6, 0.3, 0.1]
  preselect_exclude_bank: true
  preselect_exclude_sector_keywords: ["银行"]
  preselect_cache: true
  preselect_cache_ttl_sec: 120
  preselect_cache_file: ./cache/preselect_symbols.json
  hist_days: 120
  lookback_hhv: 20
  ma_fast: 5
  ma_mid: 20
  ma_slow: 60
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  vol_ratio_min: 1.5
  rs_source: ret
  rs_window: 20
  realtime_fix: true
  realtime_fix_limit: 200
  realtime_allow_direct_fallback: true
  realtime_provider: tencent
  realtime_provider_order: ["tencent"]
  realtime_biying_licence: "30F96AE3-D855-434B-83FB-20551631A984"
  realtime_biying_base_url: "http://api.biyingapi.com"
  realtime_biying_timeout: 10
  realtime_biying_chunk_size: 20
  realtime_chunk_size: 80
  realtime_max_workers: 8
  minute_live_update: true
  minute_live_only_today: true
  minute_live_only_missing_today: false
  minute_live_max_symbols: 200
  minute_live_max_workers: 10
  minute_live_cache_sec: 5
  minute_live_timeout: 4
  minute_live_limit: 320
  minute_model_cache_ttl_sec: 0
  use_proxy: false
  proxy: ''
  parallel: true
  max_workers: 12
  hist_cache: true
  hist_cache_ttl_sec: 86400
  hist_cache_dir: ./cache/hist
  model_ref:
    enabled: true
    path: ./models/lightgbm_fd1_raw_y3_thr2p_k3_refresh_norefit.json
    candidate_mode: rule_shared
    candidate_max_symbols: 3193
    minute_max_symbols: 300
    options:
      day1: ./models/lightgbm_fd1_raw_y3_thr2p_k3_refresh_norefit.json
      week5: ./models/lightgbm_fd5_excess_y3_q90q10_shortv3_k3_norefit.json
    filter_enabled: false
    min_score: 0.6
    show_min: 0.7
    cache_enabled: true
    cache_ttl_sec: 7200
    cache_dir: ./cache/model_scores
    risk_penalty:
      enabled: true
      candidate_pool_size: 100
      penalty_factor: 0.08
      turnover_ratio_weight: 0.45
      high_turnover_weight: 0.35
      volume_ratio_weight: 0.20
      hard_filter_high_turnover: false
  fundflow:
    dir: ./data/biying_fundflow
    wash_pct_floor: -1.0
    wash_volume_ratio_max: 1.0
    wash_price_vs_high_max: 0.92
    distribute_pct_cap: 1.0
    distribute_volume_ratio_min: 1.5
    distribute_price_vs_high_min: 0.97
  symbols: []
score_weights:
  mode: rule
  breakout: 40
  rs: 30
  trend: 20
  volume: 10
  rsi: 5
  macd: 5
  risk_penalty_max: 20
  path_blend: 0.65
  path_weights:
    breakout: 0.45
    pullback: 0.35
    rebound: 0.20
    momentum: 0.0
  factor_weights:
    price_accel_5: 0.2
    price_accel_10: 0.2
    price_vs_high_20: 0.2
    price_vs_ma_5: 0.2
    bull_volume: 0.1
    volume_shrink_20d: 0.1
    bear_volume_penalty: 0.1
sector_boost:
  enabled: true
  map_file: ./data/sector_map.csv
  hot_filter: false
  hot_filter_min: 1
  hot_filter_strict: false
  min_score: 30
  require_breakout: true
  require_vol_ok: true
  min_count: 3
  boost_per_stock: 1.5
  max_boost: 6.0
decision:
  mode: short_term
  min_score: 20.0
  enable_breakout: true
  enable_rebound: true
  breakout_min_score: 20.0
  require_breakout: true
  require_vol_ok: false
  require_shrink_vol: true
  shrink_vol_ratio_max: 1.0
  shrink_require_20d: false
  require_trend_confirmation: true
  min_trend: 0.8
  max_atr_pct: 0.08
  max_mdd20: 0.12
  watch_near_hhv_pct: 2.0
  breakout_confirm_days: 0
  breakout_min_volume_multiple: 0.8
  require_close_above_breakout: true
  breakout_within_days: 5
  breakout_threshold: 0.01
  require_volume_persistence: false
  allow_weak_breakout: true
  require_macd_confirmation: false
  require_bollinger_breakout: false
  stop_atr_mult: 2.0
  target_rr: 2.0
  enable_pullback: true
  pullback_ma: 20
  pullback_max_pct: 2.0
  pullback_min_score: 10
  pullback_require_vol_ok: false
  pullback_vol_ratio_min: 1.0
  pullback_require_reclaim_ma: false
  pullback_reclaim_ma_period: 10
  pullback_require_rsi: true
  pullback_rsi_min: 35
  pullback_max_rsi: 65
  pullback_max_price_from_ma: 0.05
  pullback_min_days_since_high: 3
  pullback_require_pct: false
  pullback_min_pct: -4.0
  pullback_require_macd: false
  pullback_override_ratio: 1.5
  rebound_min_score: 12.0
  post_filter_rsi_min: 25
  post_filter_rsi_max: 85
  post_filter_macd_positive: false
  signal_paths:
    breakout:
      enabled: true
      vol_threshold: 1.2
      min_pct: 1.0
      strength_cap: 0.12
    pullback:
      enabled: true
      max_ma20_dist: 0.05
      allow_below_ma20: 0.01
      shrink_threshold: 0.8
      lower_wick_ratio_min: 0.3
      min_days_since_high: 3
    rebound:
      enabled: true
      bias_threshold: -0.08
      vol_ratio_5_max: 1.2
      rsi_max: 30.0
      lower_wick_ratio_min: 0.35
      strength_cap: 0.15
  weibi_enabled: true
  weibi_key_signal_only: true
  weibi_pos_min: 5.0
  weibi_neg_max: -5.0
  weibi_strong_pos: 12.0
  weibi_strong_neg: -12.0
  weibi_breakout_neg_reduce_scale: 0.6
  weibi_pullback_pos_boost_scale: 1.2
  weibi_pullback_neg_reduce_scale: 0.85
  market_env: auto
  market_filter_v2:
    enabled: true
    block_on_fail: false
    ma_fast: 20
    ma_slow: 60
    vol_window: 20
    vol_history: 20
    vol_ratio_max: 1.5
    breadth_up_ratio_min: 0.30
  model_conflict:
    enabled: true
    model_min: 0.85
    rule_max: 20.0
  profile_filter:
    enabled: true
    close_min: 4.0
    close_max: 40.0
    pct_max: 6.0
    upper_wick_gt_body: false
    require_shrink_up: false
    shrink_vol_ratio_max: 0.95
    shrink_require_20d: false
    mkt_cap_min: 3000000000
    mkt_cap_max: 30000000000
    turnover_pct_min: 3.0
    turnover_pct_max: 15.0
    fallback_if_empty: true
  dynamic_volatility:
    enabled: true
    window: 20
    history: 20
    high_ratio: 1.2
    low_ratio: 0.8
    high:
      vol_min_mult: 1.2
      breakout_threshold_mult: 1.5
      require_volume_persistence: true
    low:
      vol_min_mult: 0.8
      breakout_threshold_mult: 0.7
      require_volume_persistence: false
  env_overrides:
    上涨趋势:
      breakout_min_volume_multiple: 1.5
      breakout_threshold: 0.02
      require_volume_persistence: false
      allow_weak_breakout: false
      require_bollinger_breakout: false
    下跌趋势:
      breakout_min_volume_multiple: 2.0
      breakout_threshold: 0.03
      require_volume_persistence: true
      allow_weak_breakout: false
      require_macd_confirmation: true
      require_bollinger_breakout: false
    震荡市场:
      breakout_min_volume_multiple: 1.2
      breakout_threshold: 0.015
      require_volume_persistence: false
      allow_weak_breakout: true
      require_bollinger_breakout: true
    横盘整理:
      breakout_min_volume_multiple: 1.1
      breakout_threshold: 0.01
      require_volume_persistence: false
      allow_weak_breakout: true
      require_bollinger_breakout: true
  intraday_v2:
    enabled: false
    minute_dir: ./data/manual_minute
    interval: m5
    only_today: false
    apply_to_watch: false
    no_data_action: WATCH
    no_data_action_after_close: BUY
    daily_gate_enabled: false
    daily_close_ma20_ratio: 0.98
    entry_start: "09:00"
    entry_end: "14:00"
    adaptive_volume: false
    breakout_mult: 1.0015
    breakout_vol_ratio_min: 1.0
    breakout_vol_ratio_max: 2.0
    pullback_ma_dev: 0.005
    pullback_vol_ratio_max: 1.1
    extended_z_max: 1.5
    atr_pct_max: 0.08
    mdd20_max: 0.12
